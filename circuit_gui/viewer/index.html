<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>stwo-circuits — circuit viewer</title>
    <link rel="stylesheet" href="vendor/cytoscape-navigator.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <span class="brand"><span class="dot"></span>stwo-circuits</span>
      <span class="divider"></span>
      <label>circuit <select id="circuit-select"></select></label>
      <span class="meta" id="meta"></span>
      <span class="spacer"></span>
      <button id="collapse-all" class="btn" title="Collapse every group to its token (double-click a group to expand)">Collapse all</button>
      <span class="divider"></span>
      <div class="btn-group" role="group" aria-label="Detail">
        <button id="toggle-simd" class="btn" title="Show individual SIMD lane gates in the focused group (tap a group first)">Simd</button>
        <button id="toggle-eq" class="btn" title="Toggle merging of equal values in the focused group (tap a group first)">Eq</button>
      </div>
      <span class="divider"></span>
      <label class="zoom-label">zoom <input type="range" id="zoom" min="0" max="100" value="0" step="1" /></label>
      <button id="fit" class="btn btn-icon" title="Fit graph to screen" aria-label="Fit to screen">⤢</button>
    </header>

    <div id="main">
      <div id="cy"></div>
      <div id="legend" class="overlay overlay-right"></div>
      <div id="tooltip"></div>
    </div>

    <!-- vendored libraries (offline) -->
    <script src="vendor/cytoscape.min.js"></script>
    <script src="vendor/dagre.min.js"></script>
    <script src="vendor/cytoscape-dagre.js"></script>
    <script src="vendor/jquery.min.js"></script>
    <script src="vendor/cytoscape-expand-collapse.js"></script>
    <script src="vendor/cytoscape-navigator.js"></script>

    <!-- generated by `cargo run` -->
    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
