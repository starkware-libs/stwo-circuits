<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>stwo-circuits — circuit viewer</title>
    <link rel="stylesheet" href="vendor/cytoscape-navigator.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <span class="brand"><span class="dot"></span>stwo-circuits</span>
      <span class="divider"></span>
      <label>circuit <select id="circuit-select"></select></label>
      <span class="meta" id="meta"></span>
      <span class="spacer"></span>
      <label>zoom <input type="range" id="zoom" min="0" max="100" value="0" step="1" /></label>
      <span class="divider"></span>
      <button id="mode" class="btn" title="Toggle drag behaviour">Pan</button>
      <button id="collapse-all" class="btn">Collapse</button>
      <button id="expand-all" class="btn">Expand</button>
      <button id="fit" class="btn">Fit</button>
    </header>

    <div id="main">
      <div id="cy"></div>
      <div id="legend" class="overlay overlay-right"></div>
      <div id="tooltip"></div>
    </div>

    <!-- vendored libraries (offline) -->
    <script src="vendor/cytoscape.min.js"></script>
    <script src="vendor/dagre.min.js"></script>
    <script src="vendor/cytoscape-dagre.js"></script>
    <script src="vendor/jquery.min.js"></script>
    <script src="vendor/cytoscape-expand-collapse.js"></script>
    <script src="vendor/cytoscape-navigator.js"></script>

    <!-- generated by `cargo run` -->
    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
